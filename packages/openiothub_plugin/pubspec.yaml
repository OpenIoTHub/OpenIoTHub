name: openiothub_plugin
description: openiothub_plugin
version: 1.0.2+66
homepage: https://github.com/OpenIoTHub

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: '>=0.19.0 <= 1.0.0'

  # OpenIoTHub 内部包
  openiothub_constants: ^1.0.0
  openiothub_api: ^1.0.5+7
  openiothub_grpc_api: ^1.0.0
  openiothub_common_pages: ^1.0.5+83

  # 网络与通信
  http: ^1.1.0
  url_launcher: ^6.1.11
  webview_flutter: ^4.2.1
  dio: ^5.1.2
  web_socket_channel: ^3.0.2
  mqtt5_client: ^4.0.2

  # 数据存储
  shared_preferences: ^2.1.1
  path_provider: ^2.0.2

  # UI 组件
  tdesign_flutter: ^0.2.3
  oktoast: ^3.3.2+1
  flutter_colorpicker: ^1.0.3
  flutter_breadcrumb: ^1.0.1
  flutter_seekbar: ^1.0.0
  cached_network_image: ^3.4.1
  flutter_svg_provider: ^1.0.7
  fl_chart: ^0.70.2
  contextmenu: ^3.0.0

  # 媒体播放
  flutter_vlc_player: ^7.4.0
  video_player: ^2.9.5

  # 文件管理
  file_picker: ^8.0.7
  filesystem_picker: ^4.1.0

  # SSH 终端
  xterm: ^4.0.0
  dartssh2: ^2.12.0

  # 数据解析
  xml: ^6.5.0
  html: ^0.15.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  intl_utils: ^2.8.3
  build_runner:
  flutter_gen_runner:

flutter_gen:
  assets:
    - lib/l10n/*.arb

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/plugins/
    - assets/plugins/casa/