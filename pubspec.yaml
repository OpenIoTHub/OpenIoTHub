name: openiothub
description: A IoT Device Manager.
homepage: https://github.com/OpenIoTHub
publish_to: 'none'

version: 1.3.94+449

environment:
  # math_expressions 3.1（见 dependency_overrides）要求 Dart ^3.8；与 fluent_ui 4.11 NumberBox 的 ShuntingYardParser 对齐。
  sdk: ">=3.8.0 <4.0.0"
  # fluent_ui 4.12+ 依赖 RadioGroup、MediaQuery.widthOf、Matrix4.scaleByDouble 等较新 Flutter API；
  # 部分 Flutter fork 或旧引擎即使用 3.32 标签也可能缺这些符号。保持 4.11.x 直至使用与上游能力一致的 SDK。
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.5

  # OpenIoTHub 插件（FFI，必须独立）
  openiothub_mobile_service: ^0.0.10
  # gRPC 协议定义（来自 pub.dev）
  openiothub_grpc_api: ^1.1.0+1

  # 网络与通信
  http: ^1.1.0
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.1.11
  multicast_dns: ^0.3.2+3
  bonsoir: ^5.1.11
  dio: ^5.5.0+1
  grpc: ^4.0.0
  protobuf: ^4.0.0
  web_socket_channel: ^3.0.2
  mqtt5_client: ^4.0.2

  # 数据存储
  shared_preferences: ^2.1.1
  path_provider: ^2.0.2

  # 状态管理
  provider: ^6.0.2
  go_router: ^14.6.2

  # UI 组件
  tdesign_flutter: ^0.2.7
  oktoast: ^3.3.2+1
  flutter_speed_dial: ^7.0.0
  mobile_scanner: ^6.0.2
  image_picker: ^1.0.7
  flutter_native_splash: ^2.4.1
  qr_flutter: ^4.1.0
  flutter_colorpicker: ^1.0.3
  flutter_breadcrumb: ^1.0.1
  flutter_seekbar: ^1.0.0
  cached_network_image: ^3.4.1
  flutter_svg_provider: ^1.0.7
  fl_chart: ^0.70.2
  contextmenu: ^3.0.0

  # 媒体播放
  flutter_vlc_player: ^7.4.0
  video_player: ^2.9.5

  # 文件管理
  file_picker: ^8.0.7
  filesystem_picker: ^4.1.0

  # SSH 终端
  xterm: ^4.0.0
  dartssh2: ^2.12.0

  # 数据解析
  xml: ^6.5.0
  html: ^0.15.6
  image: ^4.0.9

  # 广告 SDK
  gtads: ^1.5.0
  gtads_ylh: ^1.5.0
  google_mobile_ads: ^6.0.0

  # 平台功能
  permission_handler: ^11.3.1
  jaguar_flutter_asset: ^3.0.0
  jaguar: ^3.1.4
  window_manager: ^0.5.0
  flutter_foreground_task: ^9.1.0
  wakelock_plus: ^1.3.2
  package_info_plus: ^8.0.0
  network_info_plus: ^6.1.1
  sign_in_with_apple: ^7.0.1

  # WiFi 配网
  airkiss_dart: ^1.0.0

  # 第三方登录
  wechat_kit: ^6.0.1

  # 工具
  intl: '>=0.19.0 <= 1.0.0'
  jwt_decoder: ^2.0.1
  msix: ^3.16.6
  uuid: ^4.4.2
  fluent_ui: ">=4.11.5 <4.12.0"
  macos_ui: ^2.2.0
  system_theme: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # flutter pub run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.3
#  flutter_distributor: ^0.4.5
  intl_utils: ^2.8.3
  build_runner:
  flutter_gen_runner:

# fluent_ui 4.11 NumberBox 使用 ShuntingYardParser。2.5～2.7 仅有 Parser；3.1 起恢复 ShuntingYardParser（且与 evaluate API 兼容）。
dependency_overrides:
  math_expressions: 3.1.0

flutter_gen:
  assets:
    - lib/l10n/*.arb
    - lib/pages/common/l10n/*.arb
    - lib/plugins/l10n/*.arb

flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  generate: true
  # To add assets to your application, add an assets section, like this:
  # assets:
  #  - images/a_dot_burr.jpeg
  #  - images/a_dot_ham.jpeg
  assets:
    # 根目录
    - assets/

    # 通用资源
    - assets/common/
    - assets/common/feedback/

    # 图片资源
    - assets/images/
    - assets/images/leftmenu/
    - assets/images/leftmenu/avatars/
    - assets/images/leftmenu/background/
    - assets/images/logos/
    - assets/images/splash/

    # 插件资源
    - assets/plugins/
    - assets/plugins/casa/

    # Web 静态资源（SSH / VNC / Aria2）
    - assets/web/
    - assets/web/open/
    - assets/web/open/aria2/
    - assets/web/open/ssh/
    - assets/web/open/ssh/static/
    - assets/web/open/ssh/static/dist/
    - assets/web/open/ssh/static/dist/addons/
    - assets/web/open/ssh/static/dist/addons/attach/
    - assets/web/open/ssh/static/dist/addons/fit/
    - assets/web/open/ssh/static/dist/addons/fullscreen/
    - assets/web/open/ssh/static/dist/addons/linkify/
    - assets/web/open/ssh/static/dist/addons/terminado/
    - assets/web/open/vnc/
    - assets/web/open/vnc/app/
    - assets/web/open/vnc/app/images/
    - assets/web/open/vnc/app/images/icons/
    - assets/web/open/vnc/app/locale/
    - assets/web/open/vnc/app/sounds/
    - assets/web/open/vnc/app/styles/
    - assets/web/open/vnc/core/
    - assets/web/open/vnc/core/decoders/
    - assets/web/open/vnc/core/input/
    - assets/web/open/vnc/core/util/
    - assets/web/open/vnc/vendor/
    - assets/web/open/vnc/vendor/browser-es-module-loader/
    - assets/web/open/vnc/vendor/browser-es-module-loader/dist/
    - assets/web/open/vnc/vendor/browser-es-module-loader/src/
    - assets/web/open/vnc/vendor/pako/
    - assets/web/open/vnc/vendor/pako/lib/
    - assets/web/open/vnc/vendor/pako/lib/utils/
    - assets/web/open/vnc/vendor/pako/lib/zlib/

msix_config:
  display_name: openiothub
  publisher: CN=5F64CEA2-463E-41A3-AE89-6979242A61DF
  publisher_display_name: OpenIoTHub Cloud
  identity_name: 38916OpenIoTHubCloud.openiothub
  logo_path: .\assets\images\logos\openiothub_logo.png
  start_menu_icon_path: .\assets\images\logos\openiothub_logo.png
  tile_icon_path: .\assets\images\logos\openiothub_logo.png
  icons_background_color: transparent
  capabilities: internetClientServer, privateNetworkClientServer, removableStorage, location
  store: true

wechat_kit:
  app_id: wx9211939fcd68a318
  universal_link: https://iothub.cloud/app/openiothub/
tencent_kit:
  app_id: 1111913707
  universal_link: https://iothub.cloud/qq_conn/1111913707
flutter_launcher_icons:
  android: true
  adaptive_icon_foreground_inset: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/icon.png"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  windows:
    generate: true
    icon_size: 256 # min:48, max:256, default: 48
    image_path: "assets/icon/icon.png"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
